<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Location Services Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 { margin-bottom: 24px; color: #333; }
        h2 { margin-bottom: 16px; color: #555; font-size: 18px; }
        input, button {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        button {
            background: #007AFF;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }
        button:hover { background: #0051D5; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .result {
            background: #f8f9fa;
            padding: 16px;
            border-radius: 8px;
            margin-top: 12px;
            font-family: monospace;
            font-size: 12px;
            white-space: pre-wrap;
            max-height: 400px;
            overflow-y: auto;
        }
        .suggestion {
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .suggestion:hover { background: #f0f0f0; border-color: #007AFF; }
        .coords { color: #666; font-size: 12px; margin-top: 4px; }
        .status { 
            padding: 8px 12px; 
            border-radius: 6px; 
            margin-bottom: 12px;
            font-size: 13px;
        }
        .status.success { background: #d4edda; color: #155724; }
        .status.error { background: #f8d7da; color: #721c24; }
        .status.info { background: #d1ecf1; color: #0c5460; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🗺️ Location Services Test</h1>
        
        <!-- Login Section -->
        <div class="card">
            <h2>1. Login</h2>
            <input type="text" id="phone" placeholder="Phone (+254704291657)" value="+254704291657">
            <input type="password" id="password" placeholder="Password" value="NewPass123!">
            <button onclick="login()">Login</button>
            <div id="loginStatus"></div>
        </div>

        <!-- Autocomplete Section -->
        <div class="card">
            <h2>2. Autocomplete (with coordinates)</h2>
            <input type="text" id="searchQuery" placeholder="Search location (e.g., westlands)" oninput="searchLocation()">
            <div id="suggestions"></div>
            <div id="autocompleteResult" class="result" style="display:none;"></div>
        </div>

        <!-- Reverse Geocode Section -->
        <div class="card">
            <h2>3. Reverse Geocode</h2>
            <input type="number" id="lat" placeholder="Latitude (-1.2921)" value="-1.2921" step="any">
            <input type="number" id="lng" placeholder="Longitude (36.8219)" value="36.8219" step="any">
            <button onclick="reverseGeocode()">Get Address</button>
            <div id="reverseResult" class="result" style="display:none;"></div>
        </div>

        <!-- Distance Calculation Section -->
        <div class="card">
            <h2>4. Calculate Distance</h2>
            <input type="number" id="startLat" placeholder="Start Latitude" value="-1.2921" step="any">
            <input type="number" id="startLng" placeholder="Start Longitude" value="36.8219" step="any">
            <input type="number" id="endLat" placeholder="End Latitude" value="-1.2675" step="any">
            <input type="number" id="endLng" placeholder="End Longitude" value="36.8120" step="any">
            <button onclick="calculateDistance()">Calculate</button>
            <div id="distanceResult" class="result" style="display:none;"></div>
        </div>

        <!-- Price Calculator with Route -->
        <div class="card">
            <h2>5. Calculate Price with Route 💰</h2>
            <p style="color: #666; font-size: 13px; margin-bottom: 12px;">
                Calculate errand price based on pickup/dropoff locations with route visualization
            </p>
            <input type="number" id="orderTypeId" placeholder="Order Type ID (default: 1)" value="1">
            <input type="number" id="pickupLat" placeholder="Pickup Latitude (-1.2921)" value="-1.2921" step="any">
            <input type="number" id="pickupLng" placeholder="Pickup Longitude (36.8219)" value="36.8219" step="any">
            <input type="number" id="dropoffLat" placeholder="Dropoff Latitude (-1.2675)" value="-1.2675" step="any">
            <input type="number" id="dropoffLng" placeholder="Dropoff Longitude (36.8120)" value="36.8120" step="any">
            <button onclick="calculatePriceWithRoute()">Calculate Price & Route</button>
            <div id="priceRouteResult" class="result" style="display:none;"></div>
        </div>
    </div>

    <script>
        const BASE_URL = 'https://fagierrands-dev-backend.onrender.com/api';
        let token = '';

        async function login() {
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            const statusDiv = document.getElementById('loginStatus');
            
            statusDiv.innerHTML = '<div class="status info">Logging in...</div>';
            
            try {
                const response = await fetch(`${BASE_URL}/accounts/login/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone_number: phone, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    token = data.token;
                    statusDiv.innerHTML = `<div class="status success">✅ Logged in as ${data.email}</div>`;
                } else {
                    statusDiv.innerHTML = `<div class="status error">❌ ${data.message || 'Login failed'}</div>`;
                }
            } catch (error) {
                statusDiv.innerHTML = `<div class="status error">❌ ${error.message}</div>`;
            }
        }

        let searchTimeout;
        async function searchLocation() {
            clearTimeout(searchTimeout);
            const query = document.getElementById('searchQuery').value.trim();
            const suggestionsDiv = document.getElementById('suggestions');
            const resultDiv = document.getElementById('autocompleteResult');
            
            if (query.length < 2) {
                suggestionsDiv.innerHTML = '';
                return;
            }
            
            if (!token) {
                suggestionsDiv.innerHTML = '<div class="status error">Please login first</div>';
                return;
            }
            
            searchTimeout = setTimeout(async () => {
                try {
                    const start = Date.now();
                    const response = await fetch(`${BASE_URL}/locations/autocomplete/?q=${encodeURIComponent(query)}&include_coords=true`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const data = await response.json();
                    const elapsed = Date.now() - start;
                    
                    if (response.ok) {
                        suggestionsDiv.innerHTML = data.suggestions.map(s => `
                            <div class="suggestion" onclick='selectLocation(${JSON.stringify(s)})'>
                                <strong>${s.main_text}</strong><br>
                                <small>${s.secondary_text}</small>
                                <div class="coords">📍 ${s.lat}, ${s.lng}</div>
                            </div>
                        `).join('');
                        
                        resultDiv.style.display = 'block';
                        resultDiv.textContent = `⏱️ ${elapsed}ms\n\n${JSON.stringify(data, null, 2)}`;
                    } else {
                        suggestionsDiv.innerHTML = `<div class="status error">${data.error}</div>`;
                    }
                } catch (error) {
                    suggestionsDiv.innerHTML = `<div class="status error">${error.message}</div>`;
                }
            }, 300);
        }

        function selectLocation(location) {
            document.getElementById('searchQuery').value = location.description;
            document.getElementById('suggestions').innerHTML = `
                <div class="status success">
                    ✅ Selected: ${location.main_text}<br>
                    📍 Coordinates: ${location.lat}, ${location.lng}
                </div>
            `;
        }

        async function reverseGeocode() {
            const lat = document.getElementById('lat').value;
            const lng = document.getElementById('lng').value;
            const resultDiv = document.getElementById('reverseResult');
            
            if (!token) {
                alert('Please login first');
                return;
            }
            
            resultDiv.style.display = 'block';
            resultDiv.textContent = 'Loading...';
            
            try {
                const start = Date.now();
                const response = await fetch(`${BASE_URL}/locations/reverse-geocode/`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ lat: parseFloat(lat), lng: parseFloat(lng) })
                });
                const data = await response.json();
                const elapsed = Date.now() - start;
                
                resultDiv.textContent = `⏱️ ${elapsed}ms\n\n${JSON.stringify(data, null, 2)}`;
            } catch (error) {
                resultDiv.textContent = `Error: ${error.message}`;
            }
        }

        async function calculateDistance() {
            const startLat = document.getElementById('startLat').value;
            const startLng = document.getElementById('startLng').value;
            const endLat = document.getElementById('endLat').value;
            const endLng = document.getElementById('endLng').value;
            const resultDiv = document.getElementById('distanceResult');
            
            if (!token) {
                alert('Please login first');
                return;
            }
            
            resultDiv.style.display = 'block';
            resultDiv.textContent = 'Calculating...';
            
            try {
                const start = Date.now();
                const response = await fetch(`${BASE_URL}/locations/calculate-distance/`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        start_lat: parseFloat(startLat),
                        start_lng: parseFloat(startLng),
                        end_lat: parseFloat(endLat),
                        end_lng: parseFloat(endLng)
                    })
                });
                const data = await response.json();
                const elapsed = Date.now() - start;
                
                resultDiv.textContent = `⏱️ ${elapsed}ms\n\n${JSON.stringify(data, null, 2)}`;
            } catch (error) {
                resultDiv.textContent = `Error: ${error.message}`;
            }
        }

        async function calculatePriceWithRoute() {
            const orderTypeId = document.getElementById('orderTypeId').value;
            const pickupLat = document.getElementById('pickupLat').value;
            const pickupLng = document.getElementById('pickupLng').value;
            const dropoffLat = document.getElementById('dropoffLat').value;
            const dropoffLng = document.getElementById('dropoffLng').value;
            const resultDiv = document.getElementById('priceRouteResult');
            
            if (!token) {
                alert('Please login first');
                return;
            }
            
            resultDiv.style.display = 'block';
            resultDiv.textContent = 'Calculating price and route...';
            
            try {
                const start = Date.now();
                const response = await fetch(`${BASE_URL}/orders/errands/calculate-price-with-route/`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        order_type_id: parseInt(orderTypeId),
                        pickup_lat: parseFloat(pickupLat),
                        pickup_lng: parseFloat(pickupLng),
                        dropoff_lat: parseFloat(dropoffLat),
                        dropoff_lng: parseFloat(dropoffLng)
                    })
                });
                const data = await response.json();
                const elapsed = Date.now() - start;
                
                if (response.ok) {
                    resultDiv.textContent = `⏱️ ${elapsed}ms\n\n` +
                        `💰 PRICE: KSh ${data.pricing.total}\n` +
                        `📏 Distance: ${data.distance.text} (${data.distance.km.toFixed(2)} km)\n` +
                        `⏰ Duration: ${data.duration.text}\n\n` +
                        `Breakdown:\n` +
                        `  Base Fee: KSh ${data.pricing.base_fee}\n` +
                        `  Distance Fee: KSh ${data.pricing.distance_fee}\n\n` +
                        `Route:\n` +
                        `  From: ${data.route.start_address}\n` +
                        `  To: ${data.route.end_address}\n\n` +
                        `${data.pricing_note}\n\n` +
                        `Full Response:\n${JSON.stringify(data, null, 2)}`;
                } else {
                    resultDiv.textContent = `Error: ${data.error}`;
                }
            } catch (error) {
                resultDiv.textContent = `Error: ${error.message}`;
            }
        }
    </script>
</body>
</html>
