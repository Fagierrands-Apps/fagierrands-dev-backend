name: Deploy to cPanel

on:
  push:
    branches: [ production-cpanel ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Create deployment structure
        run: |
          mkdir -p deploy_temp
          
          # Copy all files directly
          rsync -av --exclude='deploy_temp' --exclude='.git' --exclude='.github' \
            --exclude='.env' --exclude='.env.local' \
            ./ deploy_temp/
          
          # Copy .env.cpanel as .env for production
          cp .env.cpanel deploy_temp/.env
      
      - name: Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@4.3.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: api.errandserver.fagierrands.com/
          local-dir: ./deploy_temp/
          dangerous-clean-slate: true
