name: Deploy to cPanel

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Create deployment structure
        run: |
          mkdir -p deploy_temp/fagierrandsbackend
          mkdir -p deploy_temp/logs
          
          # Copy root files
          cp requirements.txt deploy_temp/
          cp passenger_wsgi.py deploy_temp/
          cp .env deploy_temp/ 2>/dev/null || echo "No .env file"
          
          # Copy all application files to fagierrandsbackend folder
          rsync -av --exclude='deploy_temp' --exclude='.git' --exclude='.github' \
            --exclude='requirements.txt' --exclude='passenger_wsgi.py' --exclude='.env' \
            ./ deploy_temp/fagierrandsbackend/
      
      - name: Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@4.3.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /api.errandserver.fagitone.com/
          local-dir: ./deploy_temp/
