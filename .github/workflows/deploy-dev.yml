name: Deploy to cPanel DEV Server

on:
  push:
    branches: 
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Prepare deployment files
        run: |
          echo "Deploying MAIN branch to DEV server..."
          ls -la
      
      - name: Deploy to cPanel DEV via FTP
        uses: SamKirkland/FTP-Deploy-Action@4.3.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /fagierrandsbackendapi-dev/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.env
            **/db.sqlite3
            **/logs/**
            **/media/**
            **/__pycache__/**
            **/*.pyc
            **/.github/**
